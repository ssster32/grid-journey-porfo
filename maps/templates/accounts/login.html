{% extends "base.html" %}

{% block title %}ログイン | Grid Journey{% endblock %}

{% block content %}
  <section class="page-heading" aria-labelledby="login-heading">
    <div>
      <h1 id="login-heading">Grid Journey</h1>
      <p>メモグリッドを作成・採点するためにログインします。</p>
    </div>
  </section>

  <section class="content-section login-section" aria-labelledby="login-form-heading">
    <h2 id="login-form-heading">ログイン</h2>

    {% if form.errors %}
      <div class="message login-error-message" data-message-type="error" role="alert">
        <p>ユーザー名またはパスワードが正しくありません。</p>
        {{ form.non_field_errors }}
      </div>
    {% endif %}

    <form class="login-form" method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <label class="form-field" for="{{ form.username.id_for_label }}">
        ユーザー名
        {{ form.username }}
      </label>

      <label class="form-field" for="{{ form.password.id_for_label }}">
        パスワード
        {{ form.password }}
      </label>

      <div class="login-actions">
        <button type="submit">ログイン</button>
        <a class="back-link" href="{% url 'map-area-page-list' %}">メモグリッドへ戻る</a>
      </div>
    </form>
  </section>
{% endblock %}
