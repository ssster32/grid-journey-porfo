<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Map Demo</title>
    <link rel="stylesheet" href="/static/maps/demo.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <p class="eyebrow">API check page</p>
        <h1>Map Demo</h1>
        <p class="lead">
          確認用の簡易 UI です。既存 API を使って MapArea 一覧、GridCell 一覧、単体採点を試せます。
        </p>
      </header>

      <section class="notice" aria-label="注意">
        このページは開発確認用です。入力した Basic 認証情報は、このブラウザ上の API 呼び出しにだけ使います。
      </section>

      <section class="layout" aria-label="demo controls">
        <aside class="sidebar">
          <section class="panel" aria-labelledby="auth-heading">
            <h2 id="auth-heading">認証</h2>
            <label>
              Username
              <input id="username" type="text" value="testuser" autocomplete="username">
            </label>
            <label>
              Password
              <input id="password" type="password" value="test-password" autocomplete="current-password">
            </label>
            <button id="load-areas-button" type="button">MapArea 一覧を取得</button>
          </section>

          <section class="panel" aria-labelledby="areas-heading">
            <h2 id="areas-heading">MapArea</h2>
            <div id="areas-list" class="areas-list" aria-live="polite">
              まだ読み込んでいません。
            </div>
          </section>
        </aside>

        <section class="content-panel" aria-labelledby="grids-heading">
          <div class="content-header">
            <div>
              <h2 id="grids-heading">GridCell</h2>
              <p id="selected-area-label">MapArea を選択してください。</p>
            </div>
            <button id="reload-grids-button" type="button" disabled>GridCell を再取得</button>
          </div>

          <div id="message" class="message" aria-live="polite"></div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Row</th>
                  <th>Col</th>
                  <th>Initial</th>
                  <th>Average</th>
                  <th>Count</th>
                  <th>Calculated</th>
                  <th>Score</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="grids-body">
                <tr>
                  <td colspan="9">GridCell はまだ表示されていません。</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="/static/maps/demo.js"></script>
  </body>
</html>
